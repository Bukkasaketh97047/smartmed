spring.application.name=smartmed-backend
server.address=0.0.0.0

# Dynamic Frontend URL for CORS and OAuth redirects
app.frontend.url=${https://smartmed-frontend.vercel.app}

# Database Configuration (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/smartmed_db?createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Tesseract OCR Configuration
tesseract.path=${TESSERACT_PATH:C:/Program Files/Tesseract-OCR/tesseract.exe}
tesseract.datapath=${TESSERACT_DATAPATH:C:/Program Files/Tesseract-OCR/tessdata}
tesseract.language=eng

# File Storage Configuration
upload.path=uploads/prescriptions/

# Logging
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# JWT Secret
smartmed.jwt.secret=${JWT_SECRET:smartmed_secure_jwt_secret_32_characters_long_key}

# Google OAuth2 Configuration
# (User needs to fill these from Google Cloud Console)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# Google Gemini AI Configuration
google.gemini.api.key=${GEMINI_API_KEY}

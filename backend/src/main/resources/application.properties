spring.application.name=smartmed-backend
server.address=0.0.0.0
server.port=${PORT:8080}

# Frontend
app.frontend.url=${FRONTEND_URL:https://smartmedd.vercel.app}

# Database
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# OCR (Linux compatible)
tesseract.path=${TESSERACT_PATH:/usr/bin/tesseract}
tesseract.datapath=${TESSERACT_DATAPATH:/usr/share/tesseract-ocr/4.00/tessdata}
tesseract.language=eng

# File Storage
upload.path=uploads/prescriptions/

# Logging
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# JWT
smartmed.jwt.secret=${JWT_SECRET}

# Google OAuth
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# Gemini
google.gemini.api.key=${GEMINI_API_KEY}
